syntax = "proto3";
package monitor.proto;

// 磁盘
message DiskInfo {
  // 绝对累加计数器
  string name = 1;             // 磁盘设备名
  uint64 reads = 2;            // 累计完成的读操作计数
  uint64 writes = 3;           // 。。。。的写操作计数
  uint64 sectors_read = 4;     // 累计读取的扇区数 （1扇区 = 512字节）
  uint64 sectors_written = 5;  // 累计写入的扇区数
  uint64 read_time_ms = 6;     // 累计读操作花费的毫秒数
  uint64 write_time_ms = 7;    // 累计写操作花费的毫秒数
  uint64 io_in_progress = 8;   // 瞬间值：当前正在排队/执行的 IO操作数
  uint64 io_time_ms = 9;       // 磁盘处于忙碌状态的 总毫秒数
  uint64 weighted_io_time_ms = 10; // 加权IO时间

  // 速率/变化率字段
  double read_bytes_per_sec = 20;     // 当前读吞吐量
  double write_bytes_per_sec = 21;    // 当前写吞吐量
  double read_iops = 22;              // 每秒读操作 次数
  double write_iops = 23;             // 每秒写操作 次数
  double avg_read_latency_ms = 24;    // 平均读延迟
  double avg_write_latency_ms = 25;   // 平均写延迟
  double util_percent = 26;           // 磁盘繁忙度
}
