syntax = "proto3";
package monitor.proto;

// 软中断
message SoftIrq {
    string cpu = 1;   // CPU名称
    float hi = 2;     // high priority
    float timer = 3;  // 定时器 软中断
    float net_tx = 4; // 网络数据包 发送
    float net_rx = 5; // 网络数据包 接收
    float block = 6;  // BLOCK 块设备 IO完成
    float irq_poll = 7;// 中断轮询
    float tasklet = 8; // 小任务机制
    float sched = 9;   // 内核调度
    float hrtimer = 10; // 高精度定时器
    float rcu = 11;  // 锁机制
  }