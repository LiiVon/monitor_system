syntax = "proto3";
package monitor.proto;

message CpuStat{
    string cpu_name = 1;
    float cpu_percent = 2;  // 总cpu使用率
    float usr_percent = 3;  // 用户态cpu占比
    float system_percent = 4; // 内核态cpu占比
    float nice_percent = 5;  // 低优先级用户态占比
    float idle_percent = 6;  // 空闲时间占比
    float io_wait_percent = 7; // IO等待占比
    float irq_percent = 8;    // 硬中断占比
    float soft_irq_percent = 9; // 软中断占比
  }